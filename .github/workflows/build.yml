name: Build Blog

on:
  push:
    paths:
      - 'blog/data.json'
      - 'scripts/generate-blog.js'
  workflow_dispatch: # <--- INI ADALAH KUNCI UNTUK TOMBOL MANUAL BUILD

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run generator
        run: node scripts/generate-blog.js

      - name: Commit generated HTML
        run: |
          echo "=== MENGAMANKAN FILE ==="
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f blog.html
          git add -f blog/article/
          git add -f sitemap.xml
          git commit -m "Auto-generate blog and article pages" || echo "No changes to commit"
          git push
