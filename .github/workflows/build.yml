name: Build Blog

on:
  push:
    paths:
      - 'blog/data.json'
      - 'scripts/generate-blog.js'
  workflow_dispatch: # <--- INI ADALAH KUNCI UNTUK TOMBOL MANUAL BUILD

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4 # <-- UPDATED to v4 (Latest & fastest)

      - name: Setup Node
        uses: actions/setup-node@v4 # <-- UPDATED to v4
        with:
          node-version: 20 # <-- UPDATED to Node 20 (Current LTS)

      - name: Run generator
        run: node scripts/generate-blog.js

      - name: Commit generated HTML
        run: |
          echo "=== MENGAMANKAN FILE ==="
          # Menggunakan official GitHub Actions Bot account
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Mencegah error jika kamu melakukan push lain saat action ini sedang berjalan
          git pull --rebase || true 
          
          git add -f blog.html
          git add -f blog/article/
          git add -f sitemap.xml
          
          git commit -m "🚀 Auto-generate blog and article pages" || echo "No changes to commit"
          git push
