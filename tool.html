        const RiskTag = ({ level, t }) => {
            const colors = { 
                low: 'bg-emerald-100 text-emerald-700', 
                medium: 'bg-yellow-100 text-yellow-700', 
                high: 'bg-orange-100 text-orange-700', 
                critical: 'bg-red-100 text-red-700' 
            };
            const labelKey = `risk_${level}`;
            const label = (t && t[labelKey]) ? t[labelKey] : level;
            return <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full uppercase ${colors[level] || 'bg-slate-100 text-slate-700'}`}>{label}</span>;
        };

        const RadarChart = ({ data, labels, onChartReady }) => {
            const chartRef = useRef(null);
            const canvasRef = useRef(null);

            useEffect(() => {
                if (canvasRef.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    if (typeof Chart === 'undefined') return;

                    try {
                        const ctx = canvasRef.current.getContext('2d');
                        const scores = [
                            data?.capability?.score || 0, 
                            data?.opportunity?.score || 0, 
                            data?.motivation?.score || 0
                        ];

                        chartRef.current = new Chart(ctx, {
                            type: 'radar',
                            data: {
                                labels: labels,
                                datasets: [{
                                    label: 'Behavioral Strength',
                                    data: scores,
                                    backgroundColor: 'rgba(14, 165, 233, 0.2)',
                                    borderColor: '#0ea5e9',
                                    borderWidth: 2,
                                    pointBackgroundColor: '#0ea5e9',
                                }]
                            },
                            options: {
                                responsive: true,
                                maintainAspectRatio: false,
                                scales: {
                                    r: {
                                        angleLines: { color: '#e2e8f0' },
                                        grid: { color: '#e2e8f0' },
                                        suggestedMin: 0,
                                        suggestedMax: 10,
                                        ticks: { display: false }
                                    }
                                },
                                plugins: { legend: { display: false } },
                                animation: {
                                    onComplete: () => {
                                        if(onChartReady && chartRef.current && chartRef.current.canvas) {
                                            try {
                                                onChartReady(chartRef.current.toBase64Image());
                                            } catch(e) { console.warn("Chart export failed", e); }
                                        }
                                    }
                                }
                            }
                        });
                    } catch (e) {
                        console.error("Chart creation failed", e);
                    }
                }
                return () => { if (chartRef.current) chartRef.current.destroy(); };
            }, [data, labels]);

            return <canvas ref={canvasRef} />;
        };

                setSelectedNodeId(id);
                if (!combData[id]) setCombData(prev => ({ ...prev, [id]: getInitialComb() }));
            };

            const addNode = (type) => {
                const newId = Date.now().toString();
                const newNode = { id: newId, type, content: '', risk: 'low' };
                setNodes(prev => [...prev, newNode]);
                handleNodeClick(newId);
            };

            const updateNode = (id, field, value) => {
                setNodes(nodes.map(n => n.id === id ? { ...n, [field]: value } : n));
            };

            const deleteNode = (id, e) => {
                e.stopPropagation();
                setNodes(nodes.filter(n => n.id !== id));
                if (selectedNodeId === id) setSelectedNodeId(null);
            };

            const handleFormat = (id, formatType) => {
                const el = textareaRefs.current[id];
                if(!el) return;

                const start = el.selectionStart;
                const end = el.selectionEnd;
                const text = el.value;
                const before = text.substring(0, start);
                const selected = text.substring(start, end);
                const after = text.substring(end);

                let newText = text;
                let newCursorPos = end;

                if (formatType === 'bold') {
                    newText = `${before}**${selected}**${after}`;
                    newCursorPos = end + 4;
                } else if (formatType === 'italic') {
                    newText = `${before}*${selected}*${after}`;
                    newCursorPos = end + 2;
                } else if (formatType === 'list') {
                     // Simple list toggle or append
                     const prefix = "\n- ";
                     newText = `${before}${prefix}${selected}${after}`;
                     newCursorPos = end + prefix.length;
                } else if (formatType === 'h3') {
                     const prefix = "### ";
                     newText = `${before}${prefix}${selected}${after}`;
                     newCursorPos = end + prefix.length;
                }

                updateNode(id, 'content', newText);
                
                // Need to defer cursor setting slightly for React re-render
                setTimeout(() => {
                    if(textareaRefs.current[id]) {
                        textareaRefs.current[id].focus();
                        textareaRefs.current[id].setSelectionRange(newCursorPos, newCursorPos);

        if (!sourceId || !targetRef.current) {

            return;
        }

        const sourceEl = document.getElementById(`node-${sourceId}`);

            setPathD('');
            return;

        const targetRect = targetRef.current.getBoundingClientRect();

        const startX = sourceRect.right;
        const startY = sourceRect.top + (sourceRect.height / 2);

        const endX = targetRect.left;
        const endY = targetRect.top + 100;

        // Logic bezier curve agar garis terlihat melar dan elastis seperti karet
        const controlPointDistance = Math.max(Math.abs(endX - startX) * 0.5, 50);
        
        const d = `M ${startX} ${startY} C ${startX + controlPointDistance} ${startY}, ${endX - controlPointDistance} ${endY}, ${endX} ${endY}`;
        setPathD(d);
    };

        updateLine();
        window.addEventListener('resize', updateLine);
        window.addEventListener('scroll', updateLine, true); 
        
        return () => {
            window.removeEventListener('resize', updateLine);
            window.removeEventListener('scroll', updateLine, true);
        };
    }, [sourceId, targetRef]);

                    animation: 'dash 15s linear infinite'
                }}
            />
        </svg>

                                                        </div>
                                                        <input type="range" min="1" max="10" value={domainData.score} onChange={(e) => updateComb(domain, 'score', e.target.value)} className="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-500 mb-2" />
                                                        <textarea value={domainData.notes} onChange={(e) => updateComb(domain, 'notes', e.target.value)} placeholder={`Notes for ${t[domain]}...`} className="w-full text-xs p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:outline-none focus:border-blue-400 transition-colors resize-none" rows={2}></textarea>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                        <div className="mt-8 pt-6 border-t border-slate-100">
                                            <div className="flex justify-between items-center mb-4">
                                                <h4 className="text-sm font-bold text-slate-800"><i className="fa-solid fa-robot text-purple-500 mr-2"></i>{t.ai_feature}</h4>
                                                <div className="flex gap-2">
                                                    <button onClick={aiAnalyzeBehavior} disabled={loadingState.node === 'analyze_btn'} className={`text-[10px] font-bold bg-white border border-slate-200 px-2 py-1 rounded hover:bg-purple-50 hover:text-purple-600 transition-colors ${loadingState.node === 'analyze_btn' ? 'opacity-50' : ''}`}>
                                                        {loadingState.node === 'analyze_btn' ? <i className="fa-solid fa-circle-notch fa-spin mr-1"></i> : null} Analysis
                                                    </button>
                                                    <button onClick={aiSuggestIntervention} disabled={loadingState.node === 'intervention_btn'} className={`text-[10px] font-bold bg-white border border-slate-200 px-2 py-1 rounded hover:bg-purple-50 hover:text-purple-600 transition-colors ${loadingState.node === 'intervention_btn' ? 'opacity-50' : ''}`}>
                                                        {loadingState.node === 'intervention_btn' ? <i className="fa-solid fa-circle-notch fa-spin mr-1"></i> : null} Intervention
                                                    </button>
                                                </div>
                                            </div>
                                            <div className="space-y-3">
                                                {loadingState.global && !loadingState.node ? (
                                                    <div className="animate-pulse flex space-x-4"><div className="flex-1 space-y-2 py-1"><div className="h-2 bg-slate-200 rounded"></div><div className="h-2 bg-slate-200 rounded w-5/6"></div></div></div>
                                                ) : (
                                                    <>
                                                        <div className="p-3 bg-purple-50 border border-purple-100 rounded-lg"><div className="text-[10px] font-bold text-purple-700 uppercase mb-1">Diagnosis</div><div className="text-xs text-slate-700 whitespace-pre-line" dangerouslySetInnerHTML={{ __html: marked.parse(nodeComb.summary || "-") }}></div></div>
                                                        <div className="p-3 bg-indigo-50 border border-indigo-100 rounded-lg"><div className="text-[10px] font-bold text-indigo-700 uppercase mb-1">Recommendation</div><div className="text-xs text-slate-700 whitespace-pre-line" dangerouslySetInnerHTML={{ __html: marked.parse(nodeComb.intervention || "-") }}></div></div>
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </>
                            ) : null}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
